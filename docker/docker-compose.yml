version: "3.9"

services:
  app:
    image: spellcheckerka:latest
    build: .
    restart: always
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST:-schecker.ge}
      PORT: 4000
    ports:
      - "127.0.0.1:4001:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
