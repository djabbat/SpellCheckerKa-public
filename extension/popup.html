<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScheckerGe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: "Noto Sans Georgian", "Sylfaen", system-ui, sans-serif;
      font-size: 12px;
      background: #F8FAFC;
      color: #1E293B;
    }

    /* ── Header ── */
    .sg-header {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      color: #fff;
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sg-logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .sg-title { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
    .sg-subtitle { font-size: 10px; opacity: 0.75; margin-top: 1px; }

    /* ── Body ── */
    .sg-body { padding: 12px; }

    .sg-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .sg-input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-family: inherit;
      color: #1E293B;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .sg-input:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }

    .sg-hint {
      margin-top: 4px;
      font-size: 10px;
      color: #94A3B8;
    }

    /* ── Buttons ── */
    .sg-btn-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .sg-btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }

    .sg-btn:active { transform: scale(0.97); }

    .sg-btn-secondary {
      background: #EEF2FF;
      color: #4F46E5;
      border: 1px solid #C7D2FE;
    }

    .sg-btn-secondary:hover { background: #E0E7FF; }

    .sg-btn-primary {
      background: #4F46E5;
      color: #fff;
    }

    .sg-btn-primary:hover { background: #4338CA; }

    /* ── Divider ── */
    .sg-divider {
      border: none;
      border-top: 1px solid #E2E8F0;
      margin: 10px 0;
    }

    /* ── Shortcuts ── */
    .sg-shortcuts {
      font-size: 11px;
      color: #64748B;
      line-height: 1.7;
    }

    .sg-shortcuts kbd {
      background: #EEF2FF;
      color: #4F46E5;
      border: 1px solid #C7D2FE;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: monospace;
    }

    /* ── Status bar ── */
    #status-bar {
      padding: 6px 12px;
      font-size: 11px;
      border-top: 1px solid #E2E8F0;
      min-height: 24px;
      color: #64748B;
      background: #fff;
    }

    .status-ok   { color: #059669; font-weight: 600; }
    .status-err  { color: #DC2626; font-weight: 600; }
    .status-info { color: #4F46E5; }
  </style>
</head>
<body>

  <div class="sg-header">
    <div class="sg-logo-icon">S</div>
    <div>
      <div class="sg-title">ScheckerGe</div>
      <div class="sg-subtitle">ქართული მართლწერის შემოწმება</div>
    </div>
  </div>

  <div class="sg-body">
    <label class="sg-label" for="server-url">სერვერის URL</label>
    <input class="sg-input" type="text" id="server-url" placeholder="https://scheckerge.ge/api/check">
    <div class="sg-hint">ლოკალური: http://localhost:4000/api/check</div>

    <div class="sg-btn-row">
      <button class="sg-btn sg-btn-secondary" id="btn-test">🔌 ტესტი</button>
      <button class="sg-btn sg-btn-primary" id="btn-save">შენახვა</button>
    </div>

    <hr class="sg-divider">

    <div class="sg-shortcuts">
      <kbd>Ctrl+Shift+K</kbd> — შეამოწმე მართლწერა<br>
      Google Docs: პანელი გამოჩნდება ავტომატურად.<br>
      სხვა საიტები: კლავიატურის მალე ბმული ან კონტ. მენიუ.
    </div>
  </div>

  <div id="status-bar">მზადაა</div>

  <script src="popup.js"></script>
</body>
</html>
